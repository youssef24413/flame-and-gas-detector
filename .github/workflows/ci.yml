name: CI/CD Automated Testing Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # الوظيفة الأولى: اختبار المنطق البرمجي
  logic-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Compile Unit Tests
        run: g++ unittests/unittests.cpp -o run_tests

      - name: Execute Tests
        run: ./run_tests

 
