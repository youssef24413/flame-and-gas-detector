name: CI/CD Automated Testing Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # الوظيفة الأولى: اختبار المنطق البرمجي
  logic-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Compile Unit Tests
        run: g++ unittests/unittests.cpp -o run_tests

      - name: Execute Tests
        run: ./run_tests

  # الوظيفة الثانية: فحص جودة الكود (Static Analysis)
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Cppcheck
        run: sudo apt-get install cppcheck

      - name: Run Static Analysis
        # بيفحص كل ملفات الـ C++ وبيدي خطأ لو فيه مشكلة في جودة الكود
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            .
